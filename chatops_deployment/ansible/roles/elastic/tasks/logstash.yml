---
- name: Extract Logstash
  ansible.builtin.unarchive:
    src: "
      https://artifacts.elastic.co/downloads/logstash/logstash-{{ logstash_version }}-linux-x86_64.tar.gz
      "
    dest: /tmp
    remote_src: true
    creates: /tmp/logstash-{{ logstash_version }}
    mode: "0774"

- name: Move Logstash binaries
  become: true
  ansible.builtin.copy:
    src: "/tmp/logstash-{{ logstash_version }}/"
    dest: "/opt/logstash"
    mode: preserve
    owner: elastic
    group: elastic
    remote_src: true

- name: Copy logstash service file
  become: true
  ansible.builtin.copy:
    src: logstash.service
    dest: /etc/systemd/system/logstash.service
    owner: elastic
    group: elastic
    mode: "0774"

- name: Template logstash config
  become: true
  ansible.builtin.template:
    src: logstash.conf.j2
    dest: "/opt/logstash/config/logstash.conf"
    owner: elastic
    group: elastic
    mode: "0770"

- name: Copy certificate and key
  become: true
  ansible.builtin.copy:
    src: "./SSL/{{ item }}"
    dest: "/opt/logstash/{{ item }}"
    owner: elastic
    group: elastic
    mode: "0440"
  loop:
    - logstash.key
    - logstash.crt
    - elasticsearch.crt

- name: Start logstash service
  become: true
  ansible.builtin.systemd_service:
    name: logstash.service
    state: restarted
    daemon_reload: true
    enabled: true
