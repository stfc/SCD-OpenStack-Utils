---
- name: Create systemd-exporter group
  become: true
  ansible.builtin.group:
    name: systemd-exporter
    state: present

- name: Add ubuntu to systemd-exporter group
  become: true
  ansible.builtin.user:
    name: ubuntu
    groups: systemd-exporter
    append: true

- name: Reset connection for group changes
  ansible.builtin.meta: reset_connection

- name: Create a systemd-exporter user
  become: true
  ansible.builtin.user:
    name: systemd-exporter
    create_home: false
    group: systemd-exporter
    system: true

- name: Check if binaries exist
  ansible.builtin.stat:
    path: /opt/systemd-exporter
  register: stat_binaries

- name: Download and extract binaries
  when: not stat_binaries.stat.exists
  block:
    - name: Download systemd-exporter binaries
      ansible.builtin.get_url:
        url: "
          https://github.com/prometheus-community/systemd_exporter/releases/download/\
          v{{ systemd_exporter_version }}/systemd_exporter-{{ systemd_exporter_version }}.linux-amd64.tar.gz
        "
        dest: /tmp/systemd_exporter-{{ systemd_exporter_version }}.linux-amd64.tar.gz
        owner: ubuntu
        group: ubuntu
        mode: "0774"

    - name: Extract systemd-exporter
      ansible.builtin.unarchive:
        src: /tmp/systemd_exporter-{{ systemd_exporter_version }}.linux-amd64.tar.gz
        dest: /tmp/
        remote_src: true
        creates: /tmp/systemd_exporter-{{ systemd_exporter_version }}.linux-amd64

    - name: Create systemd-exporter directory
      become: true
      ansible.builtin.file:
        path: /opt/systemd-exporter
        state: directory
        owner: systemd-exporter
        group: systemd-exporter
        mode: "0770"

    - name: Move systemd-exporter binaries
      ansible.builtin.shell: "cp -r /tmp/systemd_exporter-{{ systemd_exporter_version }}.linux-amd64/* /opt/systemd-exporter"
      register: _
      changed_when: _.rc == 0

- name: Copy systemd-exporter service file
  become: true
  ansible.builtin.copy:
    src: systemd-exporter.service
    dest: /etc/systemd/system/systemd-exporter.service
    owner: systemd-exporter
    group: systemd-exporter
    mode: "0774"

- name: Start systemd-exporter service
  become: true
  ansible.builtin.systemd_service:
    name: systemd-exporter.service
    state: restarted
    daemon_reload: true
    enabled: true

- name: Copy filebeat external config
  become: true
  ansible.builtin.copy:
    src: systemd-exporter.filebeat.yml
    dest: /var/filebeat/systemd-exporter.filebeat.yml
    owner: root
    group: root
    mode: '0640'
