---
- name: Add known hosts
  hosts: localhost
  roles:
    - role: ssh_known_hosts

- name: Configure load balancer
  hosts: loadbalancer
  remote_user: ubuntu
  roles:
    - role: loadbalancer
      tags:
        - loadbalancer

- name: Configure ChatOps
  hosts: chatops
  remote_user: ubuntu
  roles:
    - role: chatops
      tags:
        - chatops

